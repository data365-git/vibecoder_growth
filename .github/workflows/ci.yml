name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vg/server typecheck
      - run: pnpm --filter @vg/web typecheck
      - run: pnpm --filter @vg/server build
      - run: pnpm --filter @vg/web build
      - name: Docker build
        run: docker build .
